[pytest]
testpaths = lambda
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore=cdk.out --ignore=plugins --ignore=dist --ignore=frontend --ignore=lambda/layers
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:No application metrics to publish.*:UserWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
norecursedirs = cdk.out .venv node_modules dist frontend plugins .git layers
